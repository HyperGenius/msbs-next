name: Scheduled Battle Batch

on:
  # 手動トリガー（テスト用）
  workflow_dispatch:
  
  # スケジュール実行（毎日 JST 21:00 = UTC 12:00）
  schedule:
    - cron: '0 12 * * *'

env:
  REGION: asia-northeast1
  REPOSITORY: msbs-next
  CLOUD_RUN_SERVICE: msbs-next-batch-prod

jobs:
  run-batch-job:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Workload Identity Federation に必要

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'github-actions-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute Cloud Run Job
        run: |
          gcloud run jobs execute ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.REGION }} \
            --wait \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "Cloud Run Batch Job failed. Check logs with:"
          echo "  gcloud logging read \"resource.type=cloud_run_job\" --limit=50 --project=${{ secrets.GCP_PROJECT_ID }}"
